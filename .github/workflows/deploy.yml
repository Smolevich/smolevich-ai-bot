name: Deploy to VDS

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

concurrency:
  group: deploy-to-vds
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax preflight
        run: |
          python3 -m py_compile bot/smolevich-ai-bot.py bot/migrate.py \
            bot/model-health-check.py bot/model-audio-check.py bot/model-media-check.py \
            bot/model-benchmark.py bot/scripts/refresh-benchmark-datasets.py \
            bot/agent/*.py

      - name: Stamp version
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%d")
          sed -i "s|^__VERSION__ = \"dev\"|__VERSION__ = \"$DATE-$SHA\"|" bot/smolevich-ai-bot.py
          grep -E '^__VERSION__' bot/smolevich-ai-bot.py

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:gha-runner

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VDS_HOST }}
          port: ${{ secrets.VDS_PORT }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          passphrase: ${{ secrets.VDS_SSH_PASSPHRASE }}
          source: bot/smolevich-ai-bot.py,bot/migrate.py,bot/model-health-check.py,bot/model-audio-check.py,bot/model-media-check.py,bot/model-benchmark.py,bot/benchmark-tasks.json,bot/benchmark-tasks.md,bot/benchmark-datasets,bot/scripts,bot/smolevich-ai-bot.service,bot/migrations,bot/agent,bot/Containerfile.acpx-claude,bot/cron.d
          target: /tmp/deploy-bot
          strip_components: 1

      - name: Install, migrate, restart
        uses: appleboy/ssh-action@v1.2.5
        env:
          BOT_PROXY_DISABLED: ${{ secrets.BOT_PROXY_DISABLED }}
          BOT_BENCHMARK_DISABLED: ${{ secrets.BOT_BENCHMARK_DISABLED }}
          VAULT_DEPLOY_TOKEN: ${{ secrets.VAULT_DEPLOY_TOKEN }}
        with:
          host: ${{ secrets.VDS_HOST }}
          port: ${{ secrets.VDS_PORT }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          passphrase: ${{ secrets.VDS_SSH_PASSPHRASE }}
          envs: BOT_PROXY_DISABLED,BOT_BENCHMARK_DISABLED,VAULT_DEPLOY_TOKEN
          script: |
            set -e
            APP_DIR=/opt/smolevich-ai-bot
            sudo mkdir -p "$APP_DIR"

            sudo install -m 0755 /tmp/deploy-bot/smolevich-ai-bot.py             /usr/local/bin/smolevich-ai-bot
            sudo install -m 0755 /tmp/deploy-bot/migrate.py               /usr/local/bin/migrate_bot_db
            sudo install -m 0755 /tmp/deploy-bot/model-health-check.py    /usr/local/bin/model-health-check
            sudo install -m 0755 /tmp/deploy-bot/model-audio-check.py     /usr/local/bin/model-audio-check
            sudo install -m 0755 /tmp/deploy-bot/model-media-check.py     /usr/local/bin/model-media-check
            sudo install -m 0755 /tmp/deploy-bot/model-benchmark.py       /usr/local/bin/model-benchmark
            sudo install -m 0755 /tmp/deploy-bot/scripts/refresh-benchmark-datasets.py /usr/local/bin/refresh-benchmark-datasets
            sudo install -m 0644 /tmp/deploy-bot/smolevich-ai-bot.service        /etc/systemd/system/smolevich-ai-bot.service
            sudo install -m 0644 /tmp/deploy-bot/Containerfile.acpx-claude /usr/local/bin/Containerfile.acpx-claude
            sudo install -m 0644 /tmp/deploy-bot/benchmark-tasks.json     /etc/socks-monitor/benchmark-tasks.json
            sudo install -m 0644 /tmp/deploy-bot/benchmark-tasks.md       /etc/socks-monitor/benchmark-tasks.md
            sudo mkdir -p /etc/socks-monitor/benchmark-datasets
            sudo install -m 0644 /tmp/deploy-bot/benchmark-datasets/*.json /etc/socks-monitor/benchmark-datasets/ 2>/dev/null || true
            sudo mkdir -p /usr/local/bin/migrations
            sudo cp /tmp/deploy-bot/migrations/*.py /usr/local/bin/migrations/
            sudo mkdir -p /usr/local/bin/agent
            sudo cp /tmp/deploy-bot/agent/*.py /usr/local/bin/agent/
            sudo install -m 0644 /tmp/deploy-bot/cron.d/model-checks /etc/cron.d/model-checks

            # Rebuild the sandbox image only when Containerfile actually changed.
            CF=/usr/local/bin/Containerfile.acpx-claude
            HASH_FILE=${CF}.sha256
            NEW_HASH=$(sudo sha256sum "$CF" | awk '{print $1}')
            OLD_HASH=$(sudo cat "$HASH_FILE" 2>/dev/null || echo "")
            if ! sudo podman inspect localhost/acpx-claude:latest >/dev/null 2>&1 || [ "$NEW_HASH" != "$OLD_HASH" ]; then
              echo "acpx-claude: building (hash changed or image missing)"
              sudo podman build -t acpx-claude:latest -f "$CF"
              echo "$NEW_HASH" | sudo tee "$HASH_FILE" >/dev/null
            else
              echo "acpx-claude: up-to-date (hash $NEW_HASH)"
            fi

            rm -rf /tmp/deploy-bot

            # Pull all runtime secrets from Vault (mirror voice-ai). Single rotation point:
            # update a field in Vault (secret/smolevich-ai-bot) + redeploy, no gh-secret edit.
            # Vault listens localhost-only on the server, so this runs from the SSH session.
            export VAULT_ADDR=http://127.0.0.1:8200
            if [ -z "$VAULT_DEPLOY_TOKEN" ]; then echo "ERROR: VAULT_DEPLOY_TOKEN not set" >&2; exit 1; fi
            export VAULT_TOKEN="$VAULT_DEPLOY_TOKEN"
            V_OPENROUTER=$(vault kv get -field=OPENROUTER_API_KEY secret/smolevich-ai-bot)
            V_GROQ=$(vault kv get -field=GROQ_API_KEY secret/smolevich-ai-bot)
            V_CEREBRAS=$(vault kv get -field=CEREBRAS_API_KEY secret/smolevich-ai-bot)
            V_NVIDIA=$(vault kv get -field=NVIDIA_API_KEY secret/smolevich-ai-bot)
            V_HF=$(vault kv get -field=HF_TOKEN secret/smolevich-ai-bot)
            V_LEADERBOARD=$(vault kv get -field=MODEL_LEADERBOARD_TOKEN secret/smolevich-ai-bot)
            V_PROXY=$(vault kv get -field=PROXY_URL secret/smolevich-ai-bot 2>/dev/null || true)
            for v in V_OPENROUTER V_GROQ V_CEREBRAS V_NVIDIA V_HF V_LEADERBOARD; do
              if [ -z "${!v}" ]; then echo "ERROR: $v empty from Vault" >&2; exit 1; fi
            done

            # Centralized .env — all secrets from Vault. Used by smolevich-ai-bot (systemd) and the
            # benchmark cron (which sources this file).
            sudo install -m 0600 /dev/null "$APP_DIR/.env"
            cat << EOF | sudo tee "$APP_DIR/.env" > /dev/null
            BOT_PROXY_URL=$V_PROXY
            BOT_PROXY_DISABLED=$BOT_PROXY_DISABLED
            OPENROUTER_API_KEY=$V_OPENROUTER
            GROQ_API_KEY=$V_GROQ
            CEREBRAS_API_KEY=$V_CEREBRAS
            NVIDIA_API_KEY=$V_NVIDIA
            HF_TOKEN=$V_HF
            MODEL_LEADERBOARD_TOKEN=$V_LEADERBOARD
            BOT_BENCHMARK_DISABLED=$BOT_BENCHMARK_DISABLED
            BOT_ACPX_LOCK_PATH=/var/lock/acpx.lock
            BOT_ACPX_LOCK_WAIT=30
            BOT_ACPX_ACTIVE_PATH=/run/smolevich-ai-bot-active
            BOT_BENCHMARK_TASKS=/etc/socks-monitor/benchmark-tasks.json
            BOT_BENCHMARK_METHODOLOGY=/etc/socks-monitor/benchmark-tasks.md
            BOT_BENCHMARK_DATASETS=/etc/socks-monitor/benchmark-datasets
            BOT_BENCHMARK_ROOT=/var/lib/smolevich-ai-bot/sessions/benchmarks
            EOF

            # Provider key files from Vault — fallback for the health/audio/media cron probes,
            # which run the binaries directly and do NOT source .env.
            for pair in "openrouter:$V_OPENROUTER" "groq:$V_GROQ" "cerebras:$V_CEREBRAS" "nvidia:$V_NVIDIA" "hf:$V_HF"; do
              name=${pair%%:*}; val=${pair#*:}
              sudo install -m 0600 /dev/null /etc/socks-monitor/.${name}_key
              printf '%s' "$val" | sudo tee /etc/socks-monitor/.${name}_key >/dev/null
            done

            # One-time migration off the legacy vds-agent naming; no-op once renamed.
            if [ -f /etc/systemd/system/vds-agent.service ]; then
              sudo systemctl disable --now vds-agent || true
              sudo mkdir -p /etc/systemd/system/smolevich-ai-bot.service.d
              sudo cp /etc/systemd/system/vds-agent.service.d/*.conf /etc/systemd/system/smolevich-ai-bot.service.d/ 2>/dev/null || true
              sudo rm -rf /etc/systemd/system/vds-agent.service /etc/systemd/system/vds-agent.service.d
              sudo rm -f /usr/local/bin/vds-agent /run/vds-agent-active
            fi
            if [ -d /var/lib/vds-agent ]; then sudo mv /var/lib/vds-agent /var/lib/smolevich-ai-bot; fi
            if [ -f /etc/socks-monitor/vds-agent.env ]; then sudo mv /etc/socks-monitor/vds-agent.env /etc/socks-monitor/smolevich-ai-bot.env; fi
            if [ -f /etc/cron.d/vds-sessions-cleanup ]; then
              sudo rm -f /etc/cron.d/vds-sessions-cleanup
              echo '0 3 * * * root find /var/lib/smolevich-ai-bot/sessions -mindepth 1 -maxdepth 1 -type d -mtime +14 -exec rm -rf {} +' | sudo tee /etc/cron.d/smolevich-ai-bot-sessions-cleanup >/dev/null
            fi

            sudo systemctl daemon-reload
            sudo yoyo break-lock --database "sqlite:////var/lib/telegram-llm-bot.db?timeout=60" || true
            sudo /usr/local/bin/migrate_bot_db
            sudo systemctl enable smolevich-ai-bot
            sudo systemctl restart smolevich-ai-bot
            sleep 1
            sudo systemctl is-active smolevich-ai-bot
