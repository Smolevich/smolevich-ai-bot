name: Deploy to VDS

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'vds-agent.service'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy bot
        env:
          SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.VDS_SSH_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # askpass script to feed passphrase non-interactively
          echo '#!/bin/sh' > ~/.ssh/askpass.sh
          echo 'cat ~/.ssh/.pp' >> ~/.ssh/askpass.sh
          chmod +x ~/.ssh/askpass.sh
          echo "$SSH_PASSPHRASE" > ~/.ssh/.pp
          chmod 600 ~/.ssh/.pp

          eval "$(ssh-agent -s)"
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/askpass.sh SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/id_deploy
          rm -f ~/.ssh/.pp ~/.ssh/askpass.sh

          cat >> ~/.ssh/config <<EOF
          Host vds
            HostName ${{ secrets.VDS_HOST }}
            Port ${{ secrets.VDS_PORT }}
            User ${{ secrets.VDS_USER }}
            StrictHostKeyChecking no
          EOF

          scp bot/vds-agent.py vds:/usr/local/bin/vds-agent
          ssh vds "sudo systemctl restart vds-agent && sleep 1 && sudo systemctl is-active vds-agent"
