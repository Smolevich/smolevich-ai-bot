name: Deploy to VDS

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'vds-agent.service'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy bot to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          port: ${{ secrets.VDS_PORT }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          passphrase: ${{ secrets.VDS_SSH_PASSPHRASE }}
          source: bot/vds-agent.py
          target: /tmp/deploy-bot
          strip_components: 1

      - name: Install and restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VDS_HOST }}
          port: ${{ secrets.VDS_PORT }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          passphrase: ${{ secrets.VDS_SSH_PASSPHRASE }}
          script: |
            sudo cp /tmp/deploy-bot/vds-agent.py /usr/local/bin/vds-agent
            rm -rf /tmp/deploy-bot
            sudo systemctl restart vds-agent
            sleep 1
            sudo systemctl is-active vds-agent
